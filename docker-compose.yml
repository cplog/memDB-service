version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: hindsight-postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-choose-a-strong-password}
      POSTGRES_DB: hindsight
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  hindsight:
    image: ghcr.io/vectorize-io/hindsight:latest-slim
    container_name: hindsight-app
    ports:
      - "8888:8888"
      - "9999:9999"
    environment:
      HINDSIGHT_API_LLM_PROVIDER: ${HINDSIGHT_API_LLM_PROVIDER:-openai}
      HINDSIGHT_API_LLM_MODEL: ${HINDSIGHT_API_LLM_MODEL:-gpt-4o-mini}
      HINDSIGHT_API_LLM_API_KEY: ${HINDSIGHT_API_LLM_API_KEY}
      HINDSIGHT_API_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/hindsight
      HINDSIGHT_API_MIGRATION_DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/hindsight
      HINDSIGHT_API_VECTOR_EXTENSION: pgvector
      HINDSIGHT_API_TEXT_SEARCH_EXTENSION: native
      HINDSIGHT_API_WORKER_ID: ${HINDSIGHT_API_WORKER_ID:-consultant-main}
      HINDSIGHT_CONTROL_PLANE_ENABLED: "true"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
